<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SeeMove — Boneco 3D</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f1117;
    color: #e8eaf0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #181c27;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-wrap: wrap;
  }
  .toolbar h2 { font-size: 15px; font-weight: 600; }
  .pill {
    display: flex; align-items: center; gap: 6px;
    background: #1e2333; border: 1px solid rgba(255,255,255,0.07);
    border-radius: 999px; padding: 4px 12px; font-size: 12px; color: #8b90a0;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #3e4558; }
  .dot.on { background: #1fcc8a; animation: blink 1.6s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .metrics {
    display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap;
  }
  .metric-chip {
    background: #1e2333; border: 1px solid rgba(255,255,255,0.07);
    border-radius: 6px; padding: 4px 10px; font-size: 11px;
    display: flex; flex-direction: column; align-items: center; min-width: 70px;
  }
  .metric-chip .lbl { color: #8b90a0; margin-bottom: 2px; }
  .metric-chip .val { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .metric-chip .val.ok   { color: #1fcc8a; }
  .metric-chip .val.warn { color: #f5a623; }
  .metric-chip .val.err  { color: #ff5c5c; }

  #canvas3d { flex: 1; display: block; width: 100%; }

  .overlay-msg {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 14px; color: #555d72;
    pointer-events: none;
    text-align: center; line-height: 1.6;
  }

  .controls-hint {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: #3e4558;
    background: rgba(15,17,23,0.8);
    padding: 4px 12px; border-radius: 999px;
  }
</style>
</head>
<body>

<div class="toolbar">
  <h2>🦴 Boneco 3D — SeeMove</h2>
  <div class="pill">
    <div class="dot" id="connDot"></div>
    <span id="connText">Aguardando Kinect...</span>
  </div>
  <div class="metrics">
    <div class="metric-chip">
      <span class="lbl">Ombros</span>
      <span class="val ok" id="mShoulder">0.0°</span>
    </div>
    <div class="metric-chip">
      <span class="lbl">Quadril</span>
      <span class="val ok" id="mHip">0.0°</span>
    </div>
    <div class="metric-chip">
      <span class="lbl">Tronco</span>
      <span class="val ok" id="mTrunk">0.0°</span>
    </div>
    <div class="metric-chip">
      <span class="lbl">Joelho E</span>
      <span class="val ok" id="mKneeL">0.0°</span>
    </div>
    <div class="metric-chip">
      <span class="lbl">Joelho D</span>
      <span class="val ok" id="mKneeR">0.0°</span>
    </div>
  </div>
</div>

<canvas id="canvas3d"></canvas>
<div class="overlay-msg" id="overlayMsg">Inicie o SeeMove com --kinect ou --kinect-sim<br>para ver o boneco se mover</div>
<div class="controls-hint">Arraste para girar · Scroll para zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/socket.io@4.7.2/client-dist/socket.io.min.js"></script>
<script>
// ── Three.js setup ────────────────────────────────────────────────────────
const canvas  = document.getElementById("canvas3d");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0f1117);
scene.fog = new THREE.FogExp2(0x0f1117, 0.035);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(0, 1.6, 4.5);
camera.lookAt(0, 1.0, 0);

// Lighting
const ambient = new THREE.AmbientLight(0x8090b0, 0.6);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(3, 6, 4);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x1fcc8a, 0.3);
fillLight.position.set(-3, 2, -2);
scene.add(fillLight);

// Ground / platform
const groundGeo = new THREE.BoxGeometry(1.2, 0.06, 0.7);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x1e2333, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.position.set(0, 0.03, 0);
ground.receiveShadow = true;
scene.add(ground);

// Platform border glow
const edgeGeo = new THREE.EdgesGeometry(groundGeo);
const edgeMat = new THREE.LineBasicMaterial({ color: 0x1fcc8a, opacity: 0.5, transparent: true });
const edge = new THREE.LineSegments(edgeGeo, edgeMat);
edge.position.copy(ground.position);
scene.add(edge);

// Grid
const grid = new THREE.GridHelper(6, 12, 0x1e2333, 0x1e2333);
grid.position.y = 0;
scene.add(grid);

// ── Boneco 3D ─────────────────────────────────────────────────────────────
const MAT_BODY  = new THREE.MeshStandardMaterial({ color: 0x4a9eff, roughness: 0.4, metalness: 0.1 });
const MAT_HEAD  = new THREE.MeshStandardMaterial({ color: 0x6cb8ff, roughness: 0.4 });
const MAT_JOINT = new THREE.MeshStandardMaterial({ color: 0x1fcc8a, roughness: 0.3, metalness: 0.2 });
const MAT_LIMB  = new THREE.MeshStandardMaterial({ color: 0x378add, roughness: 0.4 });
const MAT_WARN  = new THREE.MeshStandardMaterial({ color: 0xf5a623, roughness: 0.3, emissive: 0xf5a623, emissiveIntensity: 0.2 });

function makeCapsule(radiusTop, radiusBot, height, mat) {
  const geo = new THREE.CylinderGeometry(radiusTop, radiusBot, height, 10);
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = true;
  return m;
}

function makeSphere(r, mat) {
  const geo = new THREE.SphereGeometry(r, 10, 10);
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = true;
  return m;
}

// Skeleton pivot hierarchy
// All positions in meters, Y=up, origin = floor

const root = new THREE.Group(); // hips center, y=1.0
root.position.set(0, 1.0, 0);
scene.add(root);

// ── Torso ──
const torso = makeCapsule(0.14, 0.16, 0.42, MAT_BODY);
torso.position.set(0, 0.21, 0);
root.add(torso);

// ── Shoulder pivot ──
const shoulderPivot = new THREE.Group();
shoulderPivot.position.set(0, 0.42, 0);
root.add(shoulderPivot);

// Head
const neck = makeCapsule(0.05, 0.07, 0.12, MAT_BODY);
neck.position.set(0, 0.06, 0);
shoulderPivot.add(neck);

const head = makeSphere(0.14, MAT_HEAD);
head.position.set(0, 0.24, 0);
shoulderPivot.add(head);

// Shoulder joints
const lShoulderJ = makeSphere(0.06, MAT_JOINT);
lShoulderJ.position.set(-0.22, 0.02, 0);
shoulderPivot.add(lShoulderJ);

const rShoulderJ = makeSphere(0.06, MAT_JOINT);
rShoulderJ.position.set(0.22, 0.02, 0);
shoulderPivot.add(rShoulderJ);

// ── Arms ──
const lUpperArm = new THREE.Group();
lUpperArm.position.set(-0.22, 0.02, 0);
shoulderPivot.add(lUpperArm);
const lUpperArmMesh = makeCapsule(0.045, 0.055, 0.26, MAT_LIMB);
lUpperArmMesh.position.set(0, -0.13, 0);
lUpperArm.add(lUpperArmMesh);

const rUpperArm = new THREE.Group();
rUpperArm.position.set(0.22, 0.02, 0);
shoulderPivot.add(rUpperArm);
const rUpperArmMesh = makeCapsule(0.045, 0.055, 0.26, MAT_LIMB);
rUpperArmMesh.position.set(0, -0.13, 0);
rUpperArm.add(rUpperArmMesh);

// Elbow joints
const lElbowJ = makeSphere(0.045, MAT_JOINT);
lElbowJ.position.set(0, -0.26, 0);
lUpperArm.add(lElbowJ);
const rElbowJ = makeSphere(0.045, MAT_JOINT);
rElbowJ.position.set(0, -0.26, 0);
rUpperArm.add(rElbowJ);

// Forearms
const lForeArm = new THREE.Group();
lForeArm.position.set(0, -0.26, 0);
lUpperArm.add(lForeArm);
const lForeArmMesh = makeCapsule(0.035, 0.045, 0.22, MAT_LIMB);
lForeArmMesh.position.set(0, -0.11, 0);
lForeArm.add(lForeArmMesh);

const rForeArm = new THREE.Group();
rForeArm.position.set(0, -0.26, 0);
rUpperArm.add(rForeArm);
const rForeArmMesh = makeCapsule(0.035, 0.045, 0.22, MAT_LIMB);
rForeArmMesh.position.set(0, -0.11, 0);
rForeArm.add(rForeArmMesh);

// ── Hips ──
const lHipJ = makeSphere(0.07, MAT_JOINT);
lHipJ.position.set(-0.11, 0, 0);
root.add(lHipJ);

const rHipJ = makeSphere(0.07, MAT_JOINT);
rHipJ.position.set(0.11, 0, 0);
root.add(rHipJ);

// ── Legs ──
const lUpperLeg = new THREE.Group();
lUpperLeg.position.set(-0.11, 0, 0);
root.add(lUpperLeg);
const lUpperLegMesh = makeCapsule(0.065, 0.075, 0.40, MAT_BODY);
lUpperLegMesh.position.set(0, -0.20, 0);
lUpperLeg.add(lUpperLegMesh);

const rUpperLeg = new THREE.Group();
rUpperLeg.position.set(0.11, 0, 0);
root.add(rUpperLeg);
const rUpperLegMesh = makeCapsule(0.065, 0.075, 0.40, MAT_BODY);
rUpperLegMesh.position.set(0, -0.20, 0);
rUpperLeg.add(rUpperLegMesh);

// Knee joints
const lKneeJ = makeSphere(0.06, MAT_JOINT);
lKneeJ.position.set(0, -0.40, 0);
lUpperLeg.add(lKneeJ);
const rKneeJ = makeSphere(0.06, MAT_JOINT);
rKneeJ.position.set(0, -0.40, 0);
rUpperLeg.add(rKneeJ);

// Lower legs
const lLowerLeg = new THREE.Group();
lLowerLeg.position.set(0, -0.40, 0);
lUpperLeg.add(lLowerLeg);
const lLowerLegMesh = makeCapsule(0.05, 0.06, 0.36, MAT_LIMB);
lLowerLegMesh.position.set(0, -0.18, 0);
lLowerLeg.add(lLowerLegMesh);

const rLowerLeg = new THREE.Group();
rLowerLeg.position.set(0, -0.40, 0);
rUpperLeg.add(rLowerLeg);
const rLowerLegMesh = makeCapsule(0.05, 0.06, 0.36, MAT_LIMB);
rLowerLegMesh.position.set(0, -0.18, 0);
rLowerLeg.add(rLowerLegMesh);

// Feet
const lFoot = makeCapsule(0.04, 0.06, 0.16, MAT_LIMB);
lFoot.rotation.x = -Math.PI / 3;
lFoot.position.set(0, -0.36, 0.06);
lLowerLeg.add(lFoot);
const rFoot = makeCapsule(0.04, 0.06, 0.16, MAT_LIMB);
rFoot.rotation.x = -Math.PI / 3;
rFoot.position.set(0, -0.36, 0.06);
rLowerLeg.add(rFoot);

// ── Target pose (smoothly interpolated) ──────────────────────────────────
const target = {
  rootY:      1.0,    // height of hips
  rootTiltX:  0,      // forward lean (rad)
  rootTiltZ:  0,      // lateral lean (rad)
  shoulderTiltZ: 0,   // shoulder roll
  hipTiltZ:   0,
  lUpperLegX: 0,      // leg lift / squat
  rUpperLegX: 0,
  lKneeX:     0,
  rKneeX:     0,
  lUpperArmZ: -0.3,   // arms rest position
  rUpperArmZ:  0.3,
  lForeArmX:  0.2,
  rForeArmX:  0.2,
};

const current = { ...target };
const LERP = 0.08;

function lerp(a, b, t) { return a + (b - a) * t; }

// ── Skeleton data from MediaPipe ──────────────────────────────────────────
// MediaPipe joint indices
const MP = {
  NOSE:0, L_EAR:7, R_EAR:8,
  L_SHOULDER:11, R_SHOULDER:12,
  L_ELBOW:13, R_ELBOW:14,
  L_WRIST:15, R_WRIST:16,
  L_HIP:23, R_HIP:24,
  L_KNEE:25, R_KNEE:26,
  L_ANKLE:27, R_ANKLE:28,
};

function getJ(joints, idx) {
  const j = joints[String(idx)];
  return j && j.v > 0.3 ? j : null;
}

function angleBetween(ax, ay, bx, by, cx, cy) {
  const v1x = ax-bx, v1y = ay-by;
  const v2x = cx-bx, v2y = cy-by;
  const dot = v1x*v2x + v1y*v2y;
  const mag = Math.sqrt((v1x*v1x+v1y*v1y)*(v2x*v2x+v2y*v2y));
  if (mag === 0) return Math.PI;
  return Math.acos(Math.max(-1, Math.min(1, dot/mag)));
}

function applySkeletonPose(data) {
  if (!data.detected || !data.joints) return;
  const j = data.joints;

  const ls = getJ(j, MP.L_SHOULDER), rs = getJ(j, MP.R_SHOULDER);
  const lh = getJ(j, MP.L_HIP),      rh = getJ(j, MP.R_HIP);
  const lk = getJ(j, MP.L_KNEE),     rk = getJ(j, MP.R_KNEE);
  const la = getJ(j, MP.L_ANKLE),    ra = getJ(j, MP.R_ANKLE);
  const le = getJ(j, MP.L_ELBOW),    re = getJ(j, MP.R_ELBOW);
  const lw = getJ(j, MP.L_WRIST),    rw = getJ(j, MP.R_WRIST);

  // ── Shoulder tilt ──
  if (ls && rs) {
    // y increases downward in MediaPipe, so negate
    target.shoulderTiltZ = -(rs.y - ls.y) * 2.5;
  }

  // ── Hip / root tilt ──
  if (lh && rh) {
    target.hipTiltZ = -(rh.y - lh.y) * 2.5;
    // Lateral trunk lean
    const midShX = ls && rs ? (ls.x + rs.x) / 2 : 0.5;
    const midHipX = (lh.x + rh.x) / 2;
    target.rootTiltZ = (midShX - midHipX) * 2.0;
  }

  // ── Trunk forward lean (Y axis) ──
  if (ls && rs && lh && rh) {
    const midShY  = (ls.y + rs.y) / 2;
    const midHipY = (lh.y + rh.y) / 2;
    const midShX  = (ls.x + rs.x) / 2;
    const midHipX = (lh.x + rh.x) / 2;
    // Estimate forward lean from horizontal displacement
    target.rootTiltX = (midShX - midHipX) * 1.5;
  }

  // ── Left leg ──
  if (lh && lk) {
    // Knee Y relative to hip — going up = leg lift
    const dy = lk.y - lh.y;  // positive = knee below hip (normal stand)
    if (dy < 0.05) {
      // Leg raised
      target.lUpperLegX = Math.min(1.2, (0.05 - dy) * 8);
      target.lKneeX = 0;
    } else {
      // Squat depth
      const squatDepth = Math.max(0, dy - 0.25) * 3;
      target.lUpperLegX = -squatDepth * 0.6;
      target.lKneeX = squatDepth;
    }
  }

  // ── Right leg ──
  if (rh && rk) {
    const dy = rk.y - rh.y;
    if (dy < 0.05) {
      target.rUpperLegX = Math.min(1.2, (0.05 - dy) * 8);
      target.rKneeX = 0;
    } else {
      const squatDepth = Math.max(0, dy - 0.25) * 3;
      target.rUpperLegX = -squatDepth * 0.6;
      target.rKneeX = squatDepth;
    }
  }

  // ── Arms ──
  if (ls && le) {
    const dy = le.y - ls.y;
    const dx = le.x - ls.x;
    target.lUpperArmZ = -Math.atan2(-dx, dy) * 0.8 - 0.3;
  }
  if (rs && re) {
    const dy = re.y - rs.y;
    const dx = re.x - rs.x;
    target.rUpperArmZ = Math.atan2(dx, dy) * 0.8 + 0.3;
  }
  if (le && lw) {
    const dy = lw.y - le.y;
    target.lForeArmX = Math.max(-0.5, Math.min(1.5, -dy * 3));
  }
  if (re && rw) {
    const dy = rw.y - re.y;
    target.rForeArmX = Math.max(-0.5, Math.min(1.5, -dy * 3));
  }

  // Adjust root height based on average knee position
  if (lk && rk && lh && rh) {
    const avgKneeY = (lk.y + rk.y) / 2;
    const avgHipY  = (lh.y + rh.y) / 2;
    const legRatio = (avgKneeY - avgHipY);
    // Map to world height: standing=1.0, squatting lower
    target.rootY = 1.0 - Math.max(0, (legRatio - 0.25) * 1.2);
  }
}

// ── Balance Board CoG tilt ────────────────────────────────────────────────
let boardCogX = 0, boardCogY = 0;

function applyBoardTilt(d) {
  // Shift the entire figure slightly based on CoG
  boardCogX = d.cog_x || 0;
  boardCogY = d.cog_y || 0;
}

// ── Animate loop ──────────────────────────────────────────────────────────
function applyPose() {
  // Smooth interpolation
  for (const k in target) {
    current[k] = lerp(current[k], target[k], LERP);
  }

  // Root position & tilt
  root.position.y = current.rootY;
  root.rotation.x = current.rootTiltX * 0.3;
  root.rotation.z = current.rootTiltZ * 0.3 + boardCogX * 0.08;

  // Subtle board sway
  root.position.x = boardCogX * 0.05;
  root.position.z = -boardCogY * 0.04;

  // Shoulders & hips
  shoulderPivot.rotation.z = current.shoulderTiltZ * 0.4;

  // Legs
  lUpperLeg.rotation.x = current.lUpperLegX;
  rUpperLeg.rotation.x = current.rUpperLegX;
  lLowerLeg.rotation.x = -Math.abs(current.lKneeX);
  rLowerLeg.rotation.x = -Math.abs(current.rKneeX);

  // Arms
  lUpperArm.rotation.z = current.lUpperArmZ;
  rUpperArm.rotation.z = current.rUpperArmZ;
  lForeArm.rotation.x  = current.lForeArmX;
  rForeArm.rotation.x  = current.rForeArmX;

  // Knee valgus warning color
  const valgusWarn = Math.abs(data_knee_valgus_l) > 8 || Math.abs(data_knee_valgus_r) > 8;
  lKneeJ.material = valgusWarn ? MAT_WARN : MAT_JOINT;
  rKneeJ.material = valgusWarn ? MAT_WARN : MAT_JOINT;
}

let data_knee_valgus_l = 0, data_knee_valgus_r = 0;

// ── Orbit controls (manual) ───────────────────────────────────────────────
let isDragging = false, lastX = 0, lastY = 0;
let azimuth = 0, elevation = 0.15, radius = 4.5;
const TARGET_POS = new THREE.Vector3(0, 1.1, 0);

canvas.addEventListener("mousedown", e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
canvas.addEventListener("mouseup",   () => isDragging = false);
canvas.addEventListener("mouseleave",() => isDragging = false);
canvas.addEventListener("mousemove", e => {
  if (!isDragging) return;
  azimuth   -= (e.clientX - lastX) * 0.008;
  elevation -= (e.clientY - lastY) * 0.006;
  elevation  = Math.max(-0.3, Math.min(1.0, elevation));
  lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener("wheel", e => {
  radius = Math.max(1.5, Math.min(8, radius + e.deltaY * 0.005));
  e.preventDefault();
}, { passive: false });

// Touch
canvas.addEventListener("touchstart", e => {
  isDragging = true;
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
});
canvas.addEventListener("touchend", () => isDragging = false);
canvas.addEventListener("touchmove", e => {
  if (!isDragging) return;
  azimuth   -= (e.touches[0].clientX - lastX) * 0.01;
  elevation -= (e.touches[0].clientY - lastY) * 0.008;
  elevation  = Math.max(-0.3, Math.min(1.0, elevation));
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
});

function updateCamera() {
  camera.position.x = TARGET_POS.x + radius * Math.sin(azimuth) * Math.cos(elevation);
  camera.position.y = TARGET_POS.y + radius * Math.sin(elevation);
  camera.position.z = TARGET_POS.z + radius * Math.cos(azimuth) * Math.cos(elevation);
  camera.lookAt(TARGET_POS);
}

// ── Resize ────────────────────────────────────────────────────────────────
function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);
resize();

// ── Socket.IO ─────────────────────────────────────────────────────────────
const socket = io();
let kinectActive = false;

socket.on("connect", () => {
  document.getElementById("connDot").className = "dot on";
  document.getElementById("connText").textContent = "Servidor conectado";
});
socket.on("disconnect", () => {
  document.getElementById("connDot").className = "dot";
  document.getElementById("connText").textContent = "Desconectado";
});

socket.on("skeleton", data => {
  if (!kinectActive) {
    kinectActive = true;
    document.getElementById("overlayMsg").style.display = "none";
    document.getElementById("connText").textContent = "Kinect ativo";
  }
  applySkeletonPose(data);

  data_knee_valgus_l = data.knee_valgus_l || 0;
  data_knee_valgus_r = data.knee_valgus_r || 0;

  // Update metric chips
  function chipClass(v, w, e) { return Math.abs(v) > e ? "err" : Math.abs(v) > w ? "warn" : "ok"; }
  const sg = v => (v >= 0 ? "+" : "") + v.toFixed(1) + "°";

  setChip("mShoulder", data.shoulder_tilt, sg(data.shoulder_tilt || 0), chipClass(data.shoulder_tilt||0, 5, 10));
  setChip("mHip",      data.hip_tilt,      sg(data.hip_tilt      || 0), chipClass(data.hip_tilt     ||0, 6, 12));
  setChip("mTrunk",    data.trunk_lean_x,  sg(data.trunk_lean_x  || 0), chipClass(data.trunk_lean_x ||0, 8, 14));
  setChip("mKneeL",    data.knee_valgus_l, sg(data.knee_valgus_l || 0), chipClass(data.knee_valgus_l||0, 8, 15));
  setChip("mKneeR",    data.knee_valgus_r, sg(data.knee_valgus_r || 0), chipClass(data.knee_valgus_r||0, 8, 15));
});

socket.on("frame", d => applyBoardTilt(d));

function setChip(id, val, text, cls) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = "val " + cls;
}

// ── Idle animation when no kinect ─────────────────────────────────────────
let idleTick = 0;
function idleAnimation() {
  if (kinectActive) return;
  idleTick += 0.02;
  // Gentle breathing
  target.shoulderTiltZ = Math.sin(idleTick * 0.7) * 0.05;
  target.lUpperArmZ = -0.3 + Math.sin(idleTick * 0.5) * 0.05;
  target.rUpperArmZ =  0.3 - Math.sin(idleTick * 0.5) * 0.05;
  // Subtle weight shift
  target.rootTiltZ = Math.sin(idleTick * 0.3) * 0.03;
}

// ── Render loop ───────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  idleAnimation();
  applyPose();
  updateCamera();
  renderer.render(scene, camera);
}
animate();
</script>
